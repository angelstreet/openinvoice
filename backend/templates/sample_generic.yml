issuer: Generic Invoice Template
keywords:
  - INVOICE
  - Total
fields:
  amount: Total[\s:]+[\$€£]?\s?(\d[\d,]*\.?\d*)
  invoice_number: (?:INVOICE|Invoice)\s*(?:No|Number|#)?\s*#?\s*(\d+)
  date: Date[\s:]+(\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}|\w+\s+\d{1,2}[,]?\s+\d{4})
  due_date: (?:Due\s*Date|Due)[\s:]+(\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}|\w+\s+\d{1,2}[,]?\s+\d{4})
  issuer: ^(\S+(?:\s+\S+)?)\s+INVOICE
options:
  currency: USD
  decimal_separator: "."
  remove_whitespace: false
